name: Deploy to web branch

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch web branch
        run: git fetch origin web:refs/heads/web

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          BASE_PATH: /compare-scss-web/

      - name: Add static files for web branch
        run: |
          cp LICENSE dist/
          printf '%s\n' \
            '# compare-scss-web' \
            'Web-version of utility for refactoring and comparing SCSS/CSS styles.' \
            > dist/README.md

      - name: Prepare commit message
        id: meta
        run: |
          {
            echo "message<<EOF"
            node scripts/ci/prepare-deploy-message.mjs
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web
          publish_dir: ./dist
          commit_message: ${{ steps.meta.outputs.message }}